<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a6a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1f44;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Abstract geometric icon -->
  <g transform="translate(8,12)">
    <!-- Outer rounded shape -->
    <rect x="0" y="0" width="56" height="56" rx="14" ry="14" fill="url(#iconGrad)"/>
    <!-- Inner cutout circle top-left -->
    <circle cx="16" cy="20" r="8" fill="#fff"/>
    <!-- Inner cutout circle bottom-right -->
    <circle cx="40" cy="36" r="8" fill="#fff"/>
    <!-- Connecting bridge -->
    <rect x="12" y="28" width="32" height="8" rx="4" fill="#fff" opacity="0.6"/>
  </g>
  <!-- SSC text -->
  <text x="80" y="42" font-family="Inter, -apple-system, Helvetica Neue, Arial, sans-serif" font-size="36" font-weight="700" fill="#1a3a6a" letter-spacing="-1">SSC</text>
  <!-- Subtitle -->
  <text x="80" y="60" font-family="Inter, -apple-system, Helvetica Neue, Arial, sans-serif" font-size="10" font-weight="500" fill="#6e6e73" letter-spacing="2.5">SWISS SCHOOL CONSULTING</text>
</svg>
